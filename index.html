html { font-size:18px; }
@media (max-width:1439px) { html { font-size:15px; } }
@media (max-width:1199px) { html { font-size:14px; } }
@media (max-width:709px)  { html { font-size:13px; } }
@media (max-width:389px)  { html { font-size:12px; } }

*,*::before,*::after { box-sizing:border-box;margin:0;padding:0; }
:root {
  --bg:#092517; --text:#c8d5c0; --text-dim:#7a9685; --text-faint:#4a6a57;
  --border:rgba(100,160,120,0.12); --nav-h:56px;
}
html,body { width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Work Sans',sans-serif;font-size:1rem;font-weight:400;
  line-height:1.1;letter-spacing:0;-webkit-font-smoothing:antialiased; }

/* ââ COMPACT PILL NAV ââ */
#compact-nav {
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:110;
  width:68px;height:9px;border-radius:100px;
  background:rgba(225,48,103,0.72);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  transition:
    width .35s cubic-bezier(0.34,1.3,0.64,1),
    height .35s cubic-bezier(0.34,1.3,0.64,1),
    background 1.1s ease,
    opacity .3s ease;
}
#compact-nav:hover,
#compact-nav.expanded {
  width:224px;height:42px;
}
#compact-nav.article-mode { opacity:0;pointer-events:none; }
.cnav-items {
  display:flex;align-items:center;gap:0;
  opacity:0;pointer-events:none;
  transition:opacity .15s;white-space:nowrap;
}
#compact-nav:hover .cnav-items,
#compact-nav.expanded .cnav-items { opacity:1;pointer-events:all;transition:opacity .18s .16s; }
.cnav-btn {
  font-family:'New Spirit',serif;font-weight:300;
  font-size:1.05rem;
  color:#092517;background:none;border:none;cursor:pointer;
  padding:5px 12px;border-radius:100px;
  transition:background .18s;
}
.cnav-btn:hover  { background:rgba(0,0,0,0.1); }
.cnav-search {
  background:none;border:none;cursor:pointer;padding:5px 9px;
  color:#092517;display:flex;align-items:center;border-radius:100px;
  transition:background .18s;
}
.cnav-search:hover { background:rgba(0,0,0,0.1); }
.cnav-search svg { width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8; }
.nav-btn { display:none; }

/* ââ VIEWS ââ */
.view { position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .4s ease; }
.view.active { opacity:1;pointer-events:all; }
#view-map { background:var(--bg); }
/* Push article content right when side nav is showing */
#view-article.article-mode { padding-left:50px; transition:padding-left .35s; }
#map-canvas { position:absolute;inset:0;width:100%;height:100%;display:block;cursor:default; }

/* ââ LEGEND ââ */
#map-legend {
  position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:14px;z-index:50;
}
#map-legend.visible { display:flex; }
.l-item { position:relative;cursor:default;display:flex;align-items:center;justify-content:center; }
.l-circle { width:12px;height:12px;border-radius:50%;transition:transform .18s,opacity .18s; }
.l-badge {
  position:absolute;bottom:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(4px);
  font-family:'Work Sans',sans-serif;font-weight:500;
  font-size:0.82rem;letter-spacing:0.04em;
  padding:5px 14px;border-radius:100px;color:#092517;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .16s,transform .16s;
}
.l-item:hover .l-badge { opacity:1;transform:translateX(-50%) translateY(0); }
/* Hovered circle grows; others dim to 75% */
.l-item:hover .l-circle { opacity:1;transform:scale(1.1); }
#map-legend:hover .l-item       { opacity:0.75;transition:opacity .22s; }
#map-legend:hover .l-item:hover { opacity:1; }

/* ââ GUIDE BUTTON ââ */
#pos-guide-btn {
  position:fixed;bottom:calc(var(--nav-h) + 14px);left:16px;
  background:none;border:1px solid var(--border);
  color:var(--text-faint);font-family:'Work Sans',sans-serif;font-weight:400;
  font-size:0.68rem;letter-spacing:0.06em;
  padding:4px 10px;border-radius:100px;cursor:pointer;z-index:50;
  transition:color .2s,border-color .2s,background .2s;display:none;
}
#pos-guide-btn:hover { color:var(--text-dim);border-color:rgba(100,160,120,.25); }
#pos-guide-btn.on { color:var(--text);border-color:rgba(100,160,120,.35);background:rgba(100,160,120,.07); }
#pos-guide-btn.map-visible { display:block; }

/* ââ HOVER CARD ââ */
#hover-card { position:fixed;z-index:200;width:272px;
  background:rgba(5,32,22,0.97);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;backdrop-filter:blur(20px);
  box-shadow:0 8px 36px rgba(0,0,0,0.55);
  pointer-events:none;opacity:0;transform:translateY(7px) scale(0.96);
  transition:opacity .18s ease,transform .18s ease; }
#hover-card.visible { opacity:1;transform:translateY(0) scale(1);pointer-events:all; }
.card-tags { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px;align-items:center; }
.cat-tag {
  display:inline-flex;align-items:center;
  font-family:'Work Sans',sans-serif;font-weight:500;font-size:.82rem;
  letter-spacing:.04em;border-radius:100px;color:var(--bg);
  padding:0;overflow:hidden;
  transition:padding .24s cubic-bezier(0.34,1.15,0.64,1), max-width .24s cubic-bezier(0.34,1.15,0.64,1);
  max-width:14px;cursor:default;white-space:nowrap;vertical-align:middle;
}
.cat-tag .cat-dot {
  width:14px;height:14px;border-radius:50%;flex-shrink:0;display:inline-block;background:currentColor;
}
.cat-tag .cat-label {
  max-width:0;overflow:hidden;opacity:0;
  transition:max-width .24s cubic-bezier(0.34,1.15,0.64,1), opacity .2s ease, padding-left .24s;
  padding-left:0;
}
.card-tags:hover .cat-tag,.article-tags:hover .cat-tag {
  padding:4px 11px 4px 5px;max-width:130px;
}
.card-tags:hover .cat-tag .cat-label,.article-tags:hover .cat-tag .cat-label {
  max-width:110px;opacity:1;padding-left:5px;
}
.card-title { font-family:'New Spirit',serif;font-weight:300;font-size:1.22rem;
  line-height:1.18;color:var(--text);margin-bottom:5px; }
.card-date  { font-size:.7rem;color:var(--text-faint);margin-bottom:8px;letter-spacing:.02em; }
.card-excerpt { font-size:0.9rem;color:var(--text-dim);line-height:1.4;margin-bottom:12px; }
.card-read { display:inline-flex;align-items:center;gap:5px;font-family:'New Spirit',serif;
  font-weight:300;font-size:.82rem;color:var(--text-dim);
  cursor:pointer;background:none;border:none;padding:0;transition:color .2s; }
.card-read:hover { color:var(--text); }
.card-read svg { width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:1.8; }

/* ââ ARCHIVE ââ */
#view-archive { overflow-y:auto;background:var(--bg);padding-bottom:72px; }
.archive-inner { max-width:1040px;margin:0 auto;padding:44px 28px 20px; }
.archive-title { font-family:'New Spirit',serif;font-weight:300;font-size:2.4rem;
  color:var(--text);margin-bottom:5px;line-height:.95; }
.archive-subtitle { font-size:1rem;color:var(--text-faint);margin-bottom:28px; }
.filter-row { display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap; }
.filter-btn {
  background:none;border:1px solid var(--border);font-size:.85rem;
  color:var(--text-dim);padding:6px 16px;border-radius:100px;
  cursor:pointer;transition:all .2s;
}
.filter-btn:hover { border-color:rgba(100,160,120,.28);color:var(--text);background:rgba(100,160,120,.06); }
/* active state: overridden per-category with inline JS, fallback for "All" */
.filter-btn.active { border-color:rgba(100,160,120,.35);color:var(--text);background:rgba(100,160,120,.1); }
.articles-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px; }
.archive-card { background:rgba(10,48,34,.42);border:1px solid var(--border);border-radius:13px;
  padding:22px 24px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .18s,border-color .18s,background .18s; }
.archive-card:hover { transform:translateY(-2px);border-color:rgba(100,160,120,.2);background:rgba(12,56,38,.5); }
.archive-card .card-tags { gap:9px;margin-bottom:12px; }
.archive-card .card-title { font-size:1.15rem;margin-bottom:6px; }
.archive-card .card-date  { margin-bottom:9px; }
.archive-card .card-excerpt { font-size:.9rem;color:var(--text-dim);line-height:1.4; }

/* ââ ARTICLE VIEW ââ */
#view-article { overflow-y:auto;background:var(--bg);padding-bottom:72px; }
.article-inner { max-width:900px;margin:0 auto;padding:48px 48px 20px; }
.article-back { display:inline-flex;align-items:center;gap:6px;color:var(--text-faint);
  font-size:.85rem;cursor:pointer;margin-bottom:36px;background:none;border:none;padding:0;transition:color .2s; }
.article-back:hover { color:var(--text); }
.article-back svg { width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8; }
.article-tags { display:flex;flex-wrap:wrap;gap:9px;margin-bottom:14px; }
.article-title { font-family:'New Spirit',serif;font-weight:300;font-size:2.8rem;
  line-height:1.05;color:var(--text);margin-bottom:10px; }
.article-date { font-size:.85rem;color:var(--text-faint);margin-bottom:34px;letter-spacing:.02em; }

/* âââ BODY TEXT âââââââââââââââââââââââââââââââââââââââââââââââââââ
   font-size: 0.9rem, but never below 14px for readability on mobile.
   line-height: 1.4 (tighter than before, responsive too).
ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
.article-body {
  font-family:'Work Sans',sans-serif;
  font-weight:400;
  font-size: max(0.9rem, 14px);   /* scales up on desktop, min 14px on mobile */
  color:#97b29e;
  line-height:1.4;
  letter-spacing:0;
}

   Use: <img class="article-img" src="filename.jpg" alt="description">

ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
.article-img {

}

}

}

  font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;

{ id:1, col:9, row:7, categories:["Research","Projects"],
  title:"Tipu’s Tiger Tales\", date:\"December 2024", date:"December 2024",
  excerpt:"A wooden automaton built to make a British soldier scream — and everything Tipu Sultan encoded into it, discovered while developing a tiger inspired decorative typeface.",
  content:`
<p>Built sometime in the 1780s or 90s for Tipu Sultan, ruler of Mysore, the tiger is an almost life-sized wooden semi-automaton \u2014 frozen mid-maul over a European soldier lying on his back. Concealed inside the body, behind a hinged flap, is a small pipe organ. Turn the handle, and two things happen simultaneously: the man\u2019s arm lifts and falls, and the organ produces sounds meant to imitate dying moans. It\u2019s disturbing and brilliant in equal measure.</p>
<img class="article-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Tipu%27s_Tiger_with_keyboard_on_display_2006AH4168.jpg/500px-Tipu%27s_Tiger_with_keyboard_on_display_2006AH4168.jpg" alt="Tipu's Tiger in the V&A Museum, London showing the European colonist being attacked">
<p class="article-img-caption">Tipu\u2019s Tiger in the V&amp;amp;A Museum, London \u2014 showing the European colonist being attacked</p>
<h2>The Symbol</h2>
<p>The tiger wasn\u2019t decoration \u2014 it was identity. Tiger stripes ran across Tipu\u2019s coinage, his swords, his guns, and the tunics of the soldiers who fired his iron-cased rockets against the British. Jewelled gold tiger heads sat atop his throne. The motif was also deeply tied to the name Haidar \u2014 his father\u2019s name, but simultaneously a reference to Ali, the Prophet\u2019s son-in-law, known as the Lion of God. On some royal swords, the letters of \u201cHaidar\u201d were arranged to form a tiger mask. The tiger and the lion, interchangeable, both divine.</p>
<h2>The Aftermath</h2>
<p>When the British defeated Seringapatam in 1799 and killed Tipu, they looted the palace. His treasury was divided on the spot between soldiers by rank. The tiger was shipped to London \u2014 first to the East India Company\u2019s museum, then eventually to the V&amp;A, where it\u2019s been on display ever since. The British even struck a medal showing their lion forcing Tipu\u2019s tiger to the ground, borrowing his exact symbolism to declare their own victory.</p>
<img class="article-img" src="https://upload.wikimedia.org/wikipedia/commons/2/24/Tipu%27s_Tiger_Salmond_1800.jpg" alt="The first published illustration of Tipu's Tiger in James Salmond's book of 1800">
<p class="article-img-caption">The first published illustration of Tipu\u2019s Tiger in James Salmond\u2019s book of 1800</p>
<p>For extra reading: <a href="https://www.vam.ac.uk/articles/tipus-tiger?srsltid=AfmBOorsp_9HLTrTemYDttrKcZxaUmojOT2ulJmUH0xwRzKcZLQEA01B" target="_blank">V&amp;A \u2014 Tipu\u2019s Tiger</a> and <a href="https://en.wikipedia.org/wiki/Tipu%27s_Tiger" target="_blank">Wikipedia</a>. To view the typeface project this research fed into, see <a href="https://www.behance.net/gallery/217016497/Huli-Vesha" target="_blank">Huli Vesha on Behance</a>.</p>
` },

{ id:2, col:3, row:3, categories:["Research","Lectures"],
  title:"The Attention Equation", date:"December 20th 2026",
  excerpt:"An excerpt from McKinsey's article on the value of Consumer attention.",
  content:`
<p>This came out of a trendspotting research exercise, and what caught my attention was how valuable our attention actually is, and who's sitting on the other side trying to measure it.</p>
<p>McKinsey surveyed more than 7,000 consumers and proposed what they call the "Attention Equation": the idea that attention isn't simply time spent, but the quality of that time. Two people may each spend an hour consuming media, yet that hour can have completely different value depending on how engaged they are.</p>
<p>Their research estimates that an hour of focused attention during a live sporting event is worth around $33 in advertising value. By comparison, an hour spent with a newspaper is valued at roughly $1.79, social media at around $0.25, and podcasts at approximately $0.05. The gap is striking. The same sixty minutes can generate dramatically different economic value depending on how present the audience is and the context in which that attention occurs.</p>
<h2>Presence Over Passive</h2>
<p>Nobody is really watching just one thing anymore, and the data reflects that. Studies consistently show that multitasking, particularly second-screen behaviour, has become the norm while consuming entertainment. Viewers often scroll through social media, reply to messages, or browse the web while watching television or streaming content.</p>
<p>For brands, this changes how content is made. Simply occupying a space is no longer enough. The goal is to earn moments of focused attention. That has led to shorter hooks, contextual advertising that complements rather than interrupts what people are already watching, and greater emphasis on relevance over volume.</p>
<p>McKinsey's research also found that a 10% increase in attention is associated with roughly a 17% increase in sales, highlighting just how closely attention and commercial outcomes are linked. Rather than producing more content, the challenge is designing experiences that encourage genuine engagement. Better placement, stronger context, and an understanding of when audiences are truly present matter far more than simply increasing impressions.</p>
<p><a href="https://www.mckinsey.com/industries/technology-media-and-telecommunications/our-insights/the-attention-equation-winning-the-right-battles-for-consumer-attention" target="_blank">For Further Reading</a></p>
` },

{ id:3, col:5, row:6, categories:["Research","Projects"],
  title:"Spirited Stories", date:"November 2024",
  excerpt:"Tracing the almost parallel journeys of Feni and Whiskey for a Feni branding project.",
  content:`
<p>Every spirit begins as a local story. Some remain woven into the everyday lives of the people who make them, shared at celebrations, poured during festivals, and occasionally prescribed as a cure for more than just <em>“bad times”.</em> Others find a way to travel across oceans, generations, and cultures. Somewhere between the orchards of Goa and the Highlands of Scotland lie two spirits with remarkably similar beginnings- one just more widely known than the other.</p>
<h2>A fruit that's almost never eaten, a drink waiting to be discovered.</h2>
<p>Sweet, fragrant, and highly perishable, the cashew apple often plays second fiddle to the nut it carries. Yet in Goa, what would otherwise be agricultural waste is transformed into one of India's oldest distilled spirits.
While coconut Feni is Goa's original indigenous spirit, cashew Feni emerged after the Portuguese introduced cashew trees from Brazil in the 16th century. Traditionally, naturally fallen cashew apples are collected, fermented without added yeast, and distilled in copper stills, a practice that continues among many artisanal producers today.</p>
<img class="article-img" src="https://media.assettype.com/gomantaktimes/2023-04/8d0e531a-efe9-4d9f-a737-44246b56e1b7/DSCF7685.jpg" alt="Cashew Apple crushing process for Feni.">
<p class="article-img-caption">Only ripe cashew apples are crushed to extract their juice before natural fermentation begins.</p>
<p>India is the <strong>world's largest producer of cashew</strong>, yet much of the cashew apple is still discarded because of its short shelf life. In 2009, Cashew Feni became the first Indian spirit to receive a Geographical Indication (GI) tag, protecting its origin and production methods. While brands like Cazulo, Madel, and Sōzye are beginning to reshape its image, authentic Feni remains largely confined to Goa.</p>
<h2>The birth of an icon</h2>
<p>Scotch wasn't always synonymous with luxury.</p>
<p>For centuries it was distilled in remote Highland communities, often illegally to avoid heavy taxation. Its rise came through equal parts innovation and circumstance. Blended whisky introduced consistency, industrial bottling improved quality, and expanding railway networks and British trade routes carried it across continents. Then came an unexpected advantage. The phylloxera epidemic of the late nineteenth century devastated Europe's vineyards, creating a global demand for Scotch as French brandy and cognac became scarce.</p>
<img class="article-img" src="https://media.scotchwhisky.com/images/media/b6026024ca4cc932ed2522ab486bebf1.jpg" alt="">
<p class="article-img-caption">Scotch began as a regional spirit before finding a global audience. Above is an image of the now demolishes Stromness distillery closed in the 1920s.</p>
<p>Whisky's reputation extended beyond the bottle. It was prescribed as medicine, advertised as restorative, and often found its way into the hands of influential figures through medical exemptions.</p>
<img class="article-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnyWOGo9Gd1b2d0ZQiaumyumQtw9A_R1TxiT_vVmh7GkGI2lzRVBcxkho&s=10" alt="Winston Churchill's medical certificate prescribing scotch for his ailments.">
<p class="article-img-caption">Alcohol occupied an unusual place in early twentieth-century medicine, blurring the line between prescription and privilege.</p>
<h2>But, what next?</h2>
<p>The parallels are hard to ignore. Each spirit was born from local agriculture, shaped by generations of inherited craft, and deeply rooted in the identity of its region.</p>
<p>Scotch's story didn't stop at the distillery. It benefited from centuries of standardisation, industrialisation, export networks, and relentless storytelling, not to mention a vineyard epidemic that unexpectedly shifted the world's drinking habits in its favour.</p>
<p>I think Feni's next chapter lies in visibility. The craft exists, its heritage is protected, and there are countless stories waiting to be told. Better branding, contemporary cocktail culture, and a growing number of bars in Goa are already reimagining Feni for younger audiences. Perhaps that's all Feni has ever needed, not a new recipe, but a story that travels just as well as the spirit itself.</p>
` },

{ id:4, col:8, row:5, categories:["Projects"],
  title:"Designing Typography for Dyslexia", date:"December 2025",
  excerpt:"An exploration into how typography, spacing, and accessibility guidelines reshape the reading experience, revealing that thoughtful design decisions can significantly reduce cognitive load for dyslexic learners.",
  content:`
<h2>Looking Beyond Aesthetics</h2>
<p>After months of millenial blanding and its predictable typographic conventions, encountering our first dyslexia-friendly website was unexpectedly refreshing. Accustomed to condensed serif typefaces with tight letter and line spacing, we stumbled upon a design that embraced large, spacious text, where even a single word occupied significant screen space. The contrast in visual real estate was striking. One approach optimised typography for visual efficiency and aesthetics, while the other deliberately sacrificed compactness to reduce cognitive load.</p>
<p>Rather than choosing a typeface because it "looked right," every decision had been made to make reading feel easier. To better understand this shift, we also explored<a href="https://geon.github.io/programming/2016/03/03/dsxyliea" target="_blank"> dyslexia simulators,</a> experiencing first-hand how challenging it can be to interpret dense text and visually similar letterforms.</p>
<h2>Reading Between the Letters</h2>
<p>One of the biggest discoveries was that readability extends far beyond font choice. Research consistently showed that increased line spacing reduces visual crowding, while slightly expanded letter spacing improves the distinction between neighbouring characters. Larger x-heights, open counters, longer ascenders and descenders, differentiated upright forms, and clearly distinguishable letter pairs such as b/d, p/q, and I/l/1 all contribute to smoother reading. Fonts like Dyslexia Mono, <a href="https://www.lexend.com/" target="_blank">Lexend</a>, <a href="https://dyslexiefont.com/en/" target="_blank">Dyslexie</a>, and <a href="https://fonts.google.com/specimen/Atkinson+Hyperlegible" target="_blank">Atkinson Hyperlegible</a> were all built around these principles, each using different approaches to improve legibility. For most readers these details pass unnoticed, but for someone with dyslexia they can reduce fatigue, improve reading speed, and make comprehension significantly easier.</p>
<h2>Nessy- Website Case Study</h2>
<p><a href="https://www.nessy.com/en-us" target="_blank">Nessy</a> stands out for its accessibility-first interface, designed specifically for children with dyslexia through an uncluttered layout, high contrast visuals, readable typography, generous spacing, and block-based content that reduces cognitive load.</p>
<p>It simplifies navigation with a visual login system using emojis and a secret word instead of conventional usernames and passwords, while maintaining a separate, intuitive dashboard for parents and teachers to monitor progress and access resources.</p>
<p>The platform enhances engagement through gamified learning, combining interactive lessons, animated content, immediate rewards, and personalized learning paths that adapt to each child's pace and ability, creating an educational experience that is simple, motivating, and easy to navigate.</p>
<h2>A Reading System</h2>
<p>The greatest takeaway was that accessibility is never the result of a single font. Typography works as a system where spacing, hierarchy, alignment, colour contrast, and content structure all contribute equally to readability. Every decision within JAMUN was therefore grounded in research rather than convention, ensuring that the interface adapted to its users instead of expecting users to adapt to the interface.</p>
<p>The <a href="https://www.lexend.com/" target="_blank">Lexend Website</a> has some pretty cool stats, that you should most definitely check out.</p>
` },

{ id:5, col:2, row:7, categories:["Research","Reflections"],
  title:"Roots and Routes", date:"November 2024",
  excerpt:"Created for Bombay Zine Fest, Roots & Routes explores migratory communities across India, tracing where they came from, the paths they travelled, and the cultural influences they carried with them. At its heart, the project is about understanding how cultures merge, evolve, and create entirely new identities. Here are excerpts from some of my favourite stories from the research.",
  content:`
<h2>Roots and Routes</h2>
<p>Created for Bombay Zine Fest, Roots & Routes explores migratory communities across India, tracing where they came from, the paths they travelled, and the cultural influences they carried with them. At its heart, the project is about understanding how cultures merge, evolve, and create entirely new identities. Here are excerpts from some of my favourite stories from the research.</p>
<h2>The Siddis of Gujarat</h2>
<p>The story goes that when a group of Africans first arrived on the western coast of India, they saw the lions of Gir and believed they had somehow found their way home. Whether that really happened is impossible to know, but it has become one of the Siddis' best-loved origin stories, explaining how a community from East Africa came to call Gujarat home.</p>
<p>History tells us they arrived over several centuries from the Bantu-speaking regions of East and Central Africa as soldiers, sailors, merchants, and enslaved people, eventually serving regional kingdoms including the Nawab of Junagadh. Over time, they built lives that were unmistakably Indian while holding on to traces of their African heritage.</p>
<img class="article-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ0bKLDaimoiEsncHewY56TwhhOj9Rq_zbudDOTzOmSezBJ-NWa1HkyTn-W&s=10" alt="Sisters at a wedding, Surendranagar, 2006">
<p class="article-img-caption">Sisters at a wedding, Surendranagar, 2006 (My favourite from a series of photos by Ketaki Sheth)</p>
<p><a href="https://www.photoink.net/exhibitions/onbelongingphotographsofindiansofafricandescent" target="_blank">Ketaki Sheth's photos displayed at the National Gallery of Portraits in London</a></p>
<p>Today, around 20,000 Siddis live in Gujarat, many in villages around Gir National Park. Most follow Islam and Sufi traditions while continuing to honour the African saint Bava Gor, and their dance form, Siddi Dhamaal, still echoes their East African roots through energetic drumming and movement. It is a reminder that cultures rarely replace one another. More often, they layer themselves over time.</p>
<p><a href="https://www.youtube.com/watch?v=UZicGzlnHRk&list=RDUZicGzlnHRk&start_radio=1" target="_blank">Siddi Dhamal Video</a></p>
<img class="article-img" src="https://staticprintenglish.theprint.in/wp-content/uploads/2023/01/ANI-20230126114520.jpg" alt="">
<p class="article-img-caption">Hirabai Ibrahim Lobi (1960 – 24 January 2025) was an Indian tribal leader and social worker from Gujarat.</p>
<p>One of the community's most inspiring figures was Hirabai Ibrahim Lobi of Jambur village, who received the Padma Shri in 2023 for empowering Siddi women through self-help groups, education, and organic farming. Despite never receiving a formal education herself, she helped hundreds of women become financially independent before her passing in 2025. The Siddis' story is often told through migration, but it is equally one of resilience and the quiet work of building a home.</p>
<h2>Marathas of Thanjavur</h2>
<p>I grew up with my grandad narrating the stories behind my meals, while my grandmom decorated them with the best. He is a remarkably knowledgeable man, and beyond everything he achieved and knew about the epics and the agricultural industry in India, this was my favourite thing to listen to. One such special sadhya Sunday, he told us the tale of sambar-a culinary legend from Thanjavur.</p>
<p>In 1676, Venkoji (Ekoji I), the younger half-brother of Chhatrapati Shivaji, conquered Thanjavur and established the Maratha kingdom in Tamil Nadu. He arrived with an entire court of Marathi-speaking administrators, soldiers, priests, artists, and musicians. Over the next two centuries, their traditions intertwined with those of the Tamil heartland, creating a culture that was neither entirely Marathi nor entirely Tamil.</p>
<img class="article-img" src="https://www.theindianportrait.com/wp-content/uploads/2021/12/6050.jpg" alt="Vyankojirajah Bhonsle (1632–1686)">
<p class="article-img-caption">Vyankojirajah Bhonsle (1632–1686)</p>
<p>One of the most enduring stories from this cultural exchange is the origin of sambar. According to popular legend, Shahaji, Venkoji's grandson, was preparing amti, a Maharashtrian lentil curry traditionally made with kokum. When kokum wasn't available, tamarind from the fertile Cauvery delta was used instead, creating a new dish that was supposedly named after his visiting cousin, Sambhaji. While historians continue to debate the story, it captures something undeniably true about Thanjavur: it was a place where two culinary traditions met and gradually became inseparable.</p>
<img class="article-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSh8_eyxihsoBqCVj4ExWeEMayl2kY3AJ3DBxz83vDQIJPwKpBbeE3-CXk&s=10" alt="">
<img class="article-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRrn5_nUYn4cQEhc3xmpYLbQbVIgA2KSETYl_7I8lTqNPkVOw5xcVoQ1C0&s=10" alt="">
<p class="article-img-caption">Maharashtrian Amti, and Tamilian Sambar</p>
<p>That influence can still be found across Tamil cuisine. Dishes like rasavangi and pitlai retain their Marathi names while using ingredients native to Tamil Nadu, and the community continues to speak Thanjavur Marathi, a dialect shaped by more than three centuries of living alongside Tamil speakers. Listening to it today feels much like the community itself, familiar in fragments yet belonging entirely to neither language nor the other. <a href="https://www.youtube.com/watch?v=bw8QD0bJkSc" target="_blank">Here's one of the few recordings I came across while researching:</a></p>
<p>Thanjavur Marathis are often confused with the Saurashtra community because both settled in Tamil Nadu while preserving languages that originated further west. Their journeys, however, were very different. The Thanjavur Marathas arrived with a royal court after Venkoji's conquest of the region, while the Saurashtrians migrated over several centuries as skilled silk weavers fleeing repeated invasions in western India. One community transformed the politics and culture of a kingdom, while the other reshaped its textile traditions.</p>
<p><a href="youtube.com/watch?v=eRzIO4cNphg&pp=ygUTc2F1cmFzaHRyYSBsYW5ndWFnZQ%3D%3D" target="_blank">A clip I found of the Saurashtrian language</a></p>
<h2>Jews of Kerala</h2>
<p>Nobody knows exactly when the first Jewish families arrived on Kerala's Malabar Coast. Some believe they came aboard King Solomon's trading ships in search of spices, while others trace their arrival to the destruction of the Second Temple in Jerusalem in 70 CE. What is documented, however, is that around the 11th century, the Chera ruler Bhaskara Ravi Varma granted the Jewish merchant Joseph Rabban a set of copper plates bestowing trading privileges and royal honours upon his community. Those copper plates survive to this day, preserving the story of one of India's oldest migrant communities.</p>
<img class="article-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Cochin_Jewish_Inscription.JPG/500px-Cochin_Jewish_Inscription.JPG" alt="">
<p class="article-img-caption">Hebrew inscription tablet of the Kochangadi Synagogue in the courtyard wall of Paradesi Synagogue.</p>
<img class="article-img" src="https://upload.wikimedia.org/wikipedia/commons/b/bb/Jewish_synagouge_kochi_india.jpg" alt="">
<p class="article-img-caption">Interior of the synagogue facing the entrance</p>
<img class="article-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxMLqeQwKpNdx3SGKppV6X-ha-TN86DhabIYgCyN2LSMiIiSywZf8adUVH&s=10" alt="">
<p class="article-img-caption">The Chinese tiles on the floor of the synagogue</p>
<p>Over centuries, the Cochin Jews became deeply rooted in Kerala while preserving their distinct religious identity. They spoke Malayalam, celebrated Onam alongside their neighbours, removed their footwear before entering the synagogue, and built places of worship that echoed the sloping roofs and timber architecture of Kerala temples. When many families migrated to Israel after 1948, they carried these traditions with them, continuing to celebrate Onam even thousands of kilometres away. Today, only a handful of Jews remain in Kochi, but the community's legacy lives on in its synagogues, songs, recipes, and the city that embraced them for centuries.</p>
<img class="article-img" src="https://ichef.bbci.co.uk/news/1024/cpsprodpb/fa7c/live/2103c440-d717-11f0-ad12-a9f9841c5157.jpg.webp" alt="">
<p class="article-img-caption">The Paradesi Synagogue, built in 1568, is today cared for by Thaha Ibrahim, a Muslim caretaker. Few images capture Kerala's history of coexistence better than one of its last synagogues being preserved by a man from another faith.</p>
<p><a href="https://www.instagram.com/reels/DVDcbiwDBzK/" target="_blank">Also found this really sweet reel about him </a></p>
<p>There is something incredibly moving about someone preserving a culture that will never be his own. It reminds me of visiting the Kwan Kung Temple in Mumbai, where I was surprised to find a large image of Hanuman hanging beside Chinese inscriptions. Most of the temple's original Chinese community has long since left the city, yet the caretaker told me it was now his responsibility to keep the temple alive, even if that meant paying his respects to his own gods first. Perhaps that is what coexistence looks like, not simply living alongside another culture, but choosing to protect it long after its people have gone.</p>
<p>I'm biased, but this is my favourite project yet.</p>
` }

];

const ARTICLES = ARTICLES_RAW.map(a=>Object.assign({},a,colRowToRxRy(a.col,a.row)));

// âââ PATH ANCHORS âââââââââââââââââââââââââââââââââââââââââââââââââ
const ANCHORS_RAW={
  Research:    {start:{col:.1,row:1},  end:{col:10.5,row:4.5}},
  Reflections: {start:{col:.1,row:6.5},end:{col:10.5,row:3}},

  Projects:    {start:{col:.1,row:9.5},end:{col:10.5,row:8}}
};
const PATH_ANCHORS={};
Object.keys(ANCHORS_RAW).forEach(cat=>{
  const s=ANCHORS_RAW[cat].start,e=ANCHORS_RAW[cat].end;
  PATH_ANCHORS[cat]={start:{rx:(s.col-1)/9,ry:(s.row-1)/9},end:{rx:(e.col-1)/9,ry:(e.row-1)/9}};
});

// âââ NODE ANIMATION âââââââââââââââââââââââââââââââââââââââââââââââ
const NODE_ANIM={};
ARTICLES.forEach(a=>{
  NODE_ANIM[a.id]={ampY:9+Math.random()*12,ampX:2+Math.random()*4,
    freqY:.05+Math.random()*.07,freqX:.04+Math.random()*.06,
    phY:Math.random()*Math.PI*2,phX:Math.random()*Math.PI*2};
});

// âââ VIEWPORT HELPERS âââââââââââââââââââââââââââââââââââââââââââââ
const PT=55,PB=120;
function vpRange(){return window.innerHeight-PT-PB;}
function articlePx(a,time,noAnim){
  const W=window.innerWidth,R=vpRange(),anim=NODE_ANIM[a.id];
  let x=a.rx*W,y=PT+a.ry*R;
  if(!noAnim){x+=anim.ampX*Math.sin(time*anim.freqX+anim.phX);y+=anim.ampY*Math.sin(time*anim.freqY+anim.phY);}
  return{x,y};
}
function anchorPx(anchor){const W=window.innerWidth,R=vpRange();return{x:anchor.rx*W,y:PT+anchor.ry*R};}
function screenToRel(sx,sy){const W=window.innerWidth,R=vpRange();return{rx:Math.max(0,Math.min(1,sx/W)),ry:Math.max(0,Math.min(1,(sy-PT)/R))};}

// âââ PATH BUILDING ââââââââââââââââââââââââââââââââââââââââââââââââ
function buildPath(cat,time,noAnim){
  const arts=ARTICLES.filter(a=>a.categories.includes(cat)).sort((a,b)=>a.rx-b.rx);
  const an=PATH_ANCHORS[cat];
  const sp=anchorPx(an.start),ep=anchorPx(an.end);
  sp.x=Math.min(sp.x,-8);ep.x=Math.max(ep.x,window.innerWidth+8);
  const waypoints=arts.map(a=>{const d=nodeDragging&&nodeDragging.type==='article'&&nodeDragging.article.id===a.id;return articlePx(a,time,noAnim||d);});
  return[sp,...waypoints,ep];
}

// âââ SPLINE âââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function drawSmoothPath(ctx,pts){
  if(pts.length<2)return;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    ctx.bezierCurveTo(p1.x+(p2.x-p0.x)/6,p1.y+(p2.y-p0.y)/6,p2.x-(p3.x-p1.x)/6,p2.y-(p3.y-p1.y)/6,p2.x,p2.y);
  }ctx.stroke();
}

// âââ DRAWING ââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function drawNode(ctx,x,y,article,isHov,isDragged,dim=1){
  const cats=article.categories,r=isDragged?10:isHov?8.5:6.5;
  cats.forEach((cat,i)=>{const rr=r+5+i*6;ctx.beginPath();ctx.ellipse(x,y,rr+2,rr-1,.3+i*.45,0,Math.PI*2);ctx.strokeStyle=CAT_COLORS[cat];ctx.lineWidth=isHov||isDragged?1.5:1.1;ctx.globalAlpha=(isHov||isDragged?.72:.38)*dim;ctx.stroke();ctx.globalAlpha=1;});
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle='#092517';ctx.fill();
  ctx.strokeStyle=CAT_COLORS[cats[0]];ctx.lineWidth=isHov||isDragged?2.0:1.6;ctx.globalAlpha=(isHov||isDragged?1:.9)*dim;ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,2.2,0,Math.PI*2);ctx.fillStyle=CAT_COLORS[cats[0]];ctx.globalAlpha=(isHov||isDragged?1:.75)*dim;ctx.fill();ctx.globalAlpha=1;
}
function drawAnchorNode(ctx,x,y,cat,isHov,dim=1){
  const r=isHov?7:5;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle=CAT_LINE_COL[cat];ctx.lineWidth=isHov?1.8:1.2;ctx.globalAlpha=(isHov?.75:.35)*dim;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-r*.4,y);ctx.lineTo(x+r*.4,y);ctx.moveTo(x,y-r*.4);ctx.lineTo(x,y+r*.4);ctx.lineWidth=1;ctx.stroke();ctx.globalAlpha=1;
}

// âââ CANVAS âââââââââââââââââââââââââââââââââââââââââââââââââââââââ
const canvas=document.getElementById('map-canvas');
const ctx=canvas.getContext('2d');
let time=0,animFrame=null;
const nodePos={},anchorPos={};
function resizeCanvas(){
  const dpr=Math.min(devicePixelRatio,2);
  canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';canvas.style.height=window.innerHeight+'px';
  ctx.scale(dpr,dpr);
}

// âââ GUIDE ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
let guideMode=false,mousePxX=-1,mousePxY=-1;
function toggleGuide(){guideMode=!guideMode;document.getElementById('pos-guide-btn').classList.toggle('on',guideMode);}
function drawPositionGuide(ctx){
  const W=window.innerWidth,R=vpRange();
  for(let i=1;i<=10;i++){
    const x=((i-1)/9)*W,y=PT+((i-1)/9)*R;
    ctx.beginPath();ctx.moveTo(x,PT);ctx.lineTo(x,PT+R);ctx.strokeStyle='rgba(200,213,192,0.07)';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    ctx.fillStyle='rgba(200,213,192,0.22)';ctx.font='10px "Work Sans",sans-serif';
    ctx.textAlign='center';ctx.fillText(i,x,PT-7);
    ctx.textAlign='right';ctx.fillText(i,13,y+4);
  }
  if(mousePxX>=0&&mousePxY>=PT&&mousePxY<=PT+R){
    const col=Math.round(mousePxX/window.innerWidth*9+1),row=Math.round((mousePxY-PT)/R*9+1);
    const label=`col: ${col}  row: ${row}`;
    const lx=Math.min(mousePxX+16,window.innerWidth-140),ly=Math.max(mousePxY-16,PT+18);
    ctx.fillStyle='rgba(5,30,20,0.88)';ctx.fillRect(lx-7,ly-15,label.length*7.5+12,22);
    ctx.fillStyle='rgba(200,213,192,0.9)';ctx.font='500 11px "Work Sans",sans-serif';ctx.textAlign='left';ctx.fillText(label,lx,ly);
  }ctx.textAlign='left';
}

// âââ STATE ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
let currentView='map',prevView='map';
let hoveredArticle=null,cardPinned=false,cardArticle=null;
let nodeDragging=null,hoveredHandle=null;
let legendHoveredCat=null;  // set when mouse is over a legend circle
const HIT_R=22,ANCHOR_HIT_R=16;

function getHitNode(mx,my){
  for(const a of ARTICLES){const p=nodePos[a.id];if(p&&Math.hypot(mx-p.x,my-p.y)<HIT_R)return{type:'article',article:a};}
  for(const cat of CATEGORIES){const ap=anchorPos[cat];if(!ap)continue;if(Math.hypot(mx-ap.start.x,my-ap.start.y)<ANCHOR_HIT_R)return{type:'anchor',cat,which:'start'};if(Math.hypot(mx-ap.end.x,my-ap.end.y)<ANCHOR_HIT_R)return{type:'anchor',cat,which:'end'};}
  return null;
}

// âââ RENDER âââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function renderMap(){
  time+=.007;const w=window.innerWidth,h=window.innerHeight;ctx.clearRect(0,0,w,h);
  if(guideMode)drawPositionGuide(ctx);
  CATEGORIES.forEach(cat=>{
    const pts=buildPath(cat,time,false);anchorPos[cat]={start:pts[0],end:pts[pts.length-1]};
    // Dim paths not in the hovered legend category
    const dim=legendHoveredCat&&legendHoveredCat!==cat?0.5:1;
    ctx.strokeStyle=CAT_LINE_COL[cat];ctx.lineWidth=4.0;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=.68*dim;
    drawSmoothPath(ctx,pts);ctx.globalAlpha=1;
    const iHS=hoveredHandle&&hoveredHandle.type==='anchor'&&hoveredHandle.cat===cat&&hoveredHandle.which==='start';
    const iHE=hoveredHandle&&hoveredHandle.type==='anchor'&&hoveredHandle.cat===cat&&hoveredHandle.which==='end';
    drawAnchorNode(ctx,pts[0].x,pts[0].y,cat,iHS,dim);
    drawAnchorNode(ctx,pts[pts.length-1].x,pts[pts.length-1].y,cat,iHE,dim);
  });
  ARTICLES.forEach(a=>{
    const isDragged=nodeDragging&&nodeDragging.type==='article'&&nodeDragging.article.id===a.id;
    const isHov=!isDragged&&hoveredArticle&&hoveredArticle.id===a.id;
    const pos=articlePx(a,time,isDragged);nodePos[a.id]=pos;
    // Small independent bounce: node bobs slightly above/below its path position.
    // This is purely visual â it doesn't change where the path routes.
    const bounce = isDragged ? 0 : 3.5 * Math.sin(time * 1.9 + NODE_ANIM[a.id].phY + a.id * 0.7);
    const dim=legendHoveredCat&&!a.categories.includes(legendHoveredCat)?0.5:1;
    drawNode(ctx,pos.x,pos.y + bounce,a,isHov,isDragged,dim);
  });
  if(currentView==='map')animFrame=requestAnimationFrame(renderMap);
}

// âââ MOUSE ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
canvas.addEventListener('mousemove',e=>{
  mousePxX=e.clientX;mousePxY=e.clientY;
  if(nodeDragging){
    const rel=screenToRel(e.clientX,e.clientY);
    if(nodeDragging.type==='article'){nodeDragging.article.rx=rel.rx;nodeDragging.article.ry=rel.ry;}
    else{PATH_ANCHORS[nodeDragging.cat][nodeDragging.which].rx=rel.rx;PATH_ANCHORS[nodeDragging.cat][nodeDragging.which].ry=rel.ry;}
    canvas.style.cursor='grabbing';return;
  }
  const hit=getHitNode(e.clientX,e.clientY);
  hoveredHandle=(hit&&hit.type==='anchor')?hit:null;
  if(hit&&hit.type==='article'){hoveredArticle=hit.article;canvas.style.cursor='grab';if(!cardPinned||cardArticle!==hit.article){cardPinned=false;showCard(hit.article,e.clientX,e.clientY);}}
  else{hoveredArticle=null;canvas.style.cursor=(hit&&hit.type==='anchor')?'grab':'default';if(!cardPinned)hideCard();}
});
canvas.addEventListener('mouseleave',()=>{mousePxX=-1;mousePxY=-1;hoveredHandle=null;if(!nodeDragging){hoveredArticle=null;if(!cardPinned)hideCard();}});

let mouseDownHit=null,mouseDownX=0,mouseDownY=0,dragMoved=false;
canvas.addEventListener('mousedown',e=>{
  mouseDownHit=getHitNode(e.clientX,e.clientY);mouseDownX=e.clientX;mouseDownY=e.clientY;dragMoved=false;
  const onMove=ev=>{
    if(Math.hypot(ev.clientX-mouseDownX,ev.clientY-mouseDownY)>5&&mouseDownHit){
      if(!nodeDragging){nodeDragging=mouseDownHit;cardPinned=false;hideCard();}
      dragMoved=true;const rel=screenToRel(ev.clientX,ev.clientY);
      if(nodeDragging.type==='article'){nodeDragging.article.rx=rel.rx;nodeDragging.article.ry=rel.ry;}
      else{PATH_ANCHORS[nodeDragging.cat][nodeDragging.which].rx=rel.rx;PATH_ANCHORS[nodeDragging.cat][nodeDragging.which].ry=rel.ry;}
      canvas.style.cursor='grabbing';
    }
  };
  const onUp=ev=>{
    if(!dragMoved){const hit=mouseDownHit;if(hit&&hit.type==='article'){
      // Single click â open article directly
      openArticle(hit.article); cardPinned=false;
    }else{cardPinned=false;hideCard();}}
    nodeDragging=null;mouseDownHit=null;dragMoved=false;canvas.style.cursor='default';
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
  };
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
});

let touchHit=null,touchX=0,touchY=0,touchMoved=false;
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];touchX=t.clientX;touchY=t.clientY;touchMoved=false;touchHit=getHitNode(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];if(Math.hypot(t.clientX-touchX,t.clientY-touchY)>5)touchMoved=true;if(touchMoved&&touchHit){nodeDragging=touchHit;const rel=screenToRel(t.clientX,t.clientY);if(nodeDragging.type==='article'){nodeDragging.article.rx=rel.rx;nodeDragging.article.ry=rel.ry;}else{PATH_ANCHORS[nodeDragging.cat][nodeDragging.which].rx=rel.rx;PATH_ANCHORS[nodeDragging.cat][nodeDragging.which].ry=rel.ry;}}},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(!touchMoved&&touchHit&&touchHit.type==='article'){openArticle(touchHit.article);cardPinned=false;}else if(!touchMoved){cardPinned=false;hideCard();}nodeDragging=null;touchHit=null;touchMoved=false;},{passive:false});

// âââ HOVER CARD âââââââââââââââââââââââââââââââââââââââââââââââââââ
const hoverCard=document.getElementById('hover-card');
function showCard(a,mx,my){
  cardArticle=a;
  document.getElementById('card-tags').innerHTML=a.categories.map(c=>`<span class="cat-tag" style="background:${CAT_COLORS[c]}"><span class="cat-dot" style="background:${CAT_COLORS[c]}"></span><span class="cat-label">${c}</span></span>`).join('');
  document.getElementById('card-title').textContent=a.title;
  document.getElementById('card-date').textContent=a.date;
  document.getElementById('card-excerpt').textContent=a.excerpt;
  const cw=272,vw=window.innerWidth,vh=window.innerHeight;
  // Always position to the RIGHT of the cursor, clamped so it never goes off-screen
  const cx=Math.min(mx+24, vw-cw-10);
  let cy=my-22;
  if(cy+220>vh-60)cy=vh-240;if(cy<10)cy=10;
  hoverCard.style.left=cx+'px';hoverCard.style.top=cy+'px';
  hoverCard.classList.add('visible');
}
function hideCard(){if(!cardPinned){hoverCard.classList.remove('visible');hoveredArticle=null;cardArticle=null;}}
document.getElementById('card-read-btn').onclick=()=>{if(cardArticle)openArticle(cardArticle);};
hoverCard.addEventListener('mouseleave',()=>{if(!cardPinned)hideCard();});

// âââ VIEW MANAGEMENT âââââââââââââââââââââââââââââââââââââââââââââ
function showView(view){
  prevView=currentView;currentView=view;
  // Reset scroll position for archive and article views
  ['archive','article'].forEach(v=>{ const el=document.getElementById('view-'+v); if(el)el.scrollTop=0; });
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.cnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  const btn=document.getElementById('nav-'+view);if(btn)btn.classList.add('active');
  cardPinned=false;hideCard();
  const isMap=view==='map', isArticle=view==='article';
  document.getElementById('map-legend').classList.toggle('visible',isMap);
  document.getElementById('pos-guide-btn').classList.toggle('map-visible',isMap);
  // Side nav: visible in article view; compact pill: hides in article view
  document.getElementById('side-nav').classList.toggle('visible',isArticle);
  document.getElementById('compact-nav').classList.toggle('article-mode',isArticle);
  // Push article content right to avoid side-nav overlap
  document.getElementById('view-article').classList.toggle('article-mode',isArticle);
  if(isMap){cancelAnimationFrame(animFrame);animFrame=requestAnimationFrame(renderMap);}
  else cancelAnimationFrame(animFrame);
}

// âââ ARCHIVE ââââââââââââââââââââââââââââââââââââââââââââââââââââââ
let activeFilter='all';
function filterArticles(cat,btn){
  activeFilter=cat;
  // Reset all buttons
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.remove('active');
    b.style.background='';b.style.color='';b.style.borderColor='';
  });
  btn.classList.add('active');
  // Apply category colour when a specific category is active
  if(cat!=='all'&&CAT_COLORS[cat]){
    btn.style.background=CAT_COLORS[cat];
    btn.style.color='#092517';
    btn.style.borderColor=CAT_COLORS[cat];
  }
  renderArchiveGrid();
}
function renderArchiveGrid(){
  const grid=document.getElementById('articles-grid');
  const list=activeFilter==='all'?ARTICLES:ARTICLES.filter(a=>a.categories.includes(activeFilter));
  grid.innerHTML='';
  list.forEach(a=>{
    const div=document.createElement('div');div.className='archive-card';div.onclick=()=>openArticle(a);
    const bar=document.createElement('div');bar.style.cssText=`position:absolute;top:0;left:0;right:0;height:2px;background:${CAT_COLORS[a.categories[0]]};border-radius:13px 13px 0 0;`;
    div.appendChild(bar);
    div.innerHTML+=`<div class="card-tags">${a.categories.map(c=>`<span class="cat-tag" style="background:${CAT_COLORS[c]}"><span class="cat-dot" style="background:${CAT_COLORS[c]}"></span><span class="cat-label">${c}</span></span>`).join('')}</div><div class="card-title">${a.title}</div><div class="card-date">${a.date}</div><div class="card-excerpt">${a.excerpt}</div>`;
    grid.appendChild(div);
  });
}

// âââ ARTICLE VIEW âââââââââââââââââââââââââââââââââââââââââââââââââ
function openArticle(a){
  if (currentView !== 'article') prevView = currentView;

  const el = document.getElementById('view-article');

  // Scroll fix: reset immediately AND after paint to handle iframe/embed quirks
  el.style.visibility = 'hidden';
  el.scrollTop = 0;
  el.style.overflow = 'hidden';

  document.getElementById('article-tags').innerHTML=a.categories.map(c=>`<span class="cat-tag" style="background:${CAT_COLORS[c]}"><span class="cat-dot" style="background:${CAT_COLORS[c]}"></span><span class="cat-label">${c}</span></span>`).join('');
  document.getElementById('article-title').textContent=a.title;
  document.getElementById('article-date').textContent=a.date;
  document.getElementById('article-body').innerHTML=a.content;
  const rel=ARTICLES.filter(x=>x.id!==a.id&&x.categories.some(c=>a.categories.includes(c))).slice(0,4);
  document.getElementById('related-grid').innerHTML=rel.map(x=>`<div class="related-card" onclick="openArticle(ARTICLES.find(z=>z.id==${x.id}))"><div>${x.categories.map(c=>`<span class="r-dot" style="background:${CAT_COLORS[c]}"></span>`).join('')}<span style="font-size:.75rem;color:var(--text-faint);letter-spacing:.04em;">${x.categories.join(', ')}</span></div><div class="related-title">${x.title}</div></div>`).join('');

  el.scrollTop = 0;

  if (currentView !== 'article') {
    showView('article');
  } else {
    // Already in article view â ensure side nav stays visible, pill stays hidden
    document.getElementById('side-nav').classList.add('visible');
    document.getElementById('compact-nav').classList.add('article-mode');
  }

  // Reveal after layout is complete â double rAF ensures paint is done
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.scrollTop = 0;
    el.style.overflow = '';
    el.style.visibility = '';
  }));

  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
}
function goBack(){
  const art=document.getElementById('view-article');
  if(art){art.scrollTop=0;}
  showView(prevView==='article'?'map':prevView);
}

// âââ SEARCH âââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function openSearch(){document.getElementById('search-overlay').classList.add('visible');setTimeout(()=>document.getElementById('search-input').focus(),50);doSearch('');}
function closeSearch(){document.getElementById('search-overlay').classList.remove('visible');document.getElementById('search-input').value='';}
function doSearch(q){const matches=q.length<1?ARTICLES:ARTICLES.filter(a=>a.title.toLowerCase().includes(q.toLowerCase())||a.excerpt.toLowerCase().includes(q.toLowerCase())||a.categories.some(c=>c.toLowerCase().includes(q.toLowerCase())));document.getElementById('search-results').innerHTML=matches.map(a=>`<div class="s-item" onclick="closeSearch();openArticle(ARTICLES.find(x=>x.id==${a.id}))"><span class="s-dot" style="background:${CAT_COLORS[a.categories[0]]}"></span><div><div class="s-title">${a.title}</div><div class="s-meta">${a.date} Â· ${a.categories.join(', ')}</div></div></div>`).join('');}
document.getElementById('search-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSearch();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});

// âââ INIT âââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
renderArchiveGrid();
document.getElementById('map-legend').classList.add('visible');
document.getElementById('pos-guide-btn').classList.add('map-visible');

// Legend dot hover â dim other categories on canvas
document.querySelectorAll('.l-item').forEach(item=>{
  const cat=item.querySelector('.l-badge')?.textContent.trim();
  if(cat){
    item.addEventListener('mouseenter',()=>{ legendHoveredCat=cat; });
    item.addEventListener('mouseleave',()=>{ legendHoveredCat=null; });
  }
});

// ââ Compact pill nav: cycle through category colours ââ
const PILL_COLORS = [
  'rgba(225,48,103,0.72)',   // Research â semi-transparent
  'rgba(168,193,189,0.72)',  // Reflections
  'rgba(254,125,20,0.72)',   // Lectures
  'rgba(151,158,19,0.72)'    // Projects
];
let pillIdx = 0;
const pillEl = document.getElementById('compact-nav');
setInterval(()=>{
  pillIdx = (pillIdx+1) % PILL_COLORS.length;
  pillEl.style.background = PILL_COLORS[pillIdx];
}, 2200);

// Touch: tap the pill to toggle expanded state (no hover on mobile)
pillEl.addEventListener('click', e=>{
  if(e.target === pillEl){ pillEl.classList.toggle('expanded'); }
});

renderMap();
</script>
